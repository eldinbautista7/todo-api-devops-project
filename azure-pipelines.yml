trigger:
- main

pool:
  name: MyLocalAgent

stages:

# ── CI ──────────────────────────────────────────────
- stage: Build
  jobs:
  - job: BuildAndTest
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: npm install
      displayName: 'Install Dependencies'

    - script: npm test -- --coverage
      displayName: 'Run Tests with Coverage'


# ── SonarCloud ──────────────────────────────────────
- stage: SonarCloud
  dependsOn: Build
  jobs:
  - job: StaticAnalysis
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: npm install
      displayName: 'Install Dependencies'

    - task: SonarCloudPrepare@3
      inputs:
        SonarCloud: 'SonarCloud'
        organization: 'eldinbautista7'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'eldinbautista7_todo-api-devops-project'
        cliProjectName: 'todo-api-devops-project'
        extraProperties: |
          sonar.sources=src
          sonar.tests=tests
          sonar.javascript.lcov.reportPaths=coverage/lcov.info

    - task: SonarCloudAnalyze@3

    - task: SonarCloudPublish@3
      inputs:
        pollingTimeoutSec: '300'


# ── CD ──────────────────────────────────────────────
- stage: Deliver
  dependsOn: SonarCloud
  jobs:
  - job: PackageArtifact
    steps:
    - script: npm pack
      displayName: 'Package Artifact'

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '.'
        artifactName: 'drop'


# ── Deployments ─────────────────────────────────────

- stage: DeployDev
  dependsOn: Deliver
  jobs:
  - job: DeployDev
    steps:
    - script: echo "Deploying to Dev environment"
      displayName: 'Deploy to Dev'


- stage: DeployQAT
  dependsOn: Deliver
  jobs:
  - job: DeployQAT
    steps:
    - script: echo "Deploying to QAT environment"
      displayName: 'Deploy to QAT'


- stage: DeployStaging
  dependsOn: Deliver
  jobs:
  - job: DeployStaging
    steps:
    - script: echo "Deploying to Staging environment"
      displayName: 'Deploy to Staging'


- stage: DeployProduction
  dependsOn: Deliver
  jobs:
  - job: DeployProd
    steps:
    - script: echo "Deploying to Production environment"
      displayName: 'Deploy to Production'